<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - StudyTracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }
        .auth-header .icon {
            font-size: 3.5em;
            margin-bottom: 10px;
        }
        .auth-header h1 {
            color: #333;
            font-size: 1.8em;
            font-weight: 700;
        }
        .auth-header p {
            color: #888;
            font-size: 0.95em;
            margin-top: 8px;
        }
        .alert {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.95em;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #555;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            color: #333;
            transition: all 0.3s ease;
            background: #f8f9fa;
            outline: none;
        }
        .form-control:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }
        .form-control::placeholder {
            color: #aaa;
        }
        .text-danger {
            color: #dc3545;
            font-size: 0.85em;
            margin-top: 5px;
            display: block;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;

            margin-top: 10px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* Стили для "Запомнить меня" */
        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 5px 0 20px 0;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .remember-me label {
            color: #666;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
        }

        .form-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .form-footer p {
            color: #888;
            font-size: 0.9em;
        }
        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .form-footer a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .form-footer .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #888;
            font-size: 0.9em;
            margin-top: 12px;
            transition: color 0.3s ease;
        }

        .form-footer .back-link:hover {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-header">
        <div class="icon">🔐</div>
        <h1>Добро пожаловать!</h1>
        <p>Войдите в свою учетную запись</p>
    </div>

    <!-- Ошибка авторизации -->
    <div th:if="${param.error}" class="alert alert-danger">
        ❌ Неверное имя пользователя или пароль
    </div>

    <!-- Успешный выход -->
    <div th:if="${param.logout}" class="alert alert-success">
        ✅ Вы успешно вышли из системы
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">👤 Имя пользователя</label>
            <input type="text" id="username" name="username"
                   class="form-control" placeholder="Введите имя пользователя"
                   required autofocus>
        </div>

        <div class="form-group">
            <label for="password">🔒 Пароль</label>
            <input type="password" id="password" name="password"
                   class="form-control" placeholder="Введите пароль" required>
        </div>

        <!-- "Запомнить меня" -->
        <div class="remember-me">
            <input type="checkbox" id="remember-me" name="remember-me">
            <label for="remember-me">✅ Запомнить меня</label>
        </div>

        <button type="submit" class="btn btn-primary">
            🚀 Войти
        </button>
    </form>

    <div class="form-footer">
        <p>Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a></p>
        <a th:href="@{/}" class="back-link">← На главную</a>
    </div>
</div>
</body>
</html>
