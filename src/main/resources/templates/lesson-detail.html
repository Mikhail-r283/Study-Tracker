<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${lesson.title}">Урок</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            color: #00d4ff;
            font-size: 1.5em;
            margin-bottom: 25px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .option {
            background: #252540;
            border: 2px solid #333366;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .option:hover {
            border-color: #00d4ff;
            background: #2a2a4e;
        }
        .option input[type="radio"] {
            margin-right: 10px;
        }
        .option label {
            cursor: pointer;
            font-size: 1.1em;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin-right: 10px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: #00d4ff;
            color: #000;
        }
        .btn-primary:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #333366;
            color: #e0e0e0;
        }
        .btn-success {
            background: #4caf50;
            color: #fff;
        }
        .alert-warning {
            background: #3a2a0a;
            border: 1px solid #ff9800;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #ffb74d;
        }
        .alert-success {
            background: #0a3a0a;
            border: 1px solid #4caf50;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #81c784;
        }
        .lesson-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333366;
        }
        .lesson-meta {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            font-size: 0.9em;
        }
        .difficulty-tag {
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 500;
        }
        .difficulty-EASY {
            background: #1b5e20;
            color: #a5d6a7;
        }
        .difficulty-MEDIUM {
            background: #e65100;
            color: #ffcc80;
        }
        .difficulty-HARD {
            background: #b71c1c;
            color: #ef9a9a;
        }
        .question-block {
            margin-bottom: 35px;
            padding: 20px;
            background: #16162a;
            border-radius: 12px;
            border: 1px solid #252540;
        }
        .question-number {
            color: #00d4ff;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 1.15em;
            margin-bottom: 15px;
            color: #ffffff;
        }
        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #1a1a35;
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
        }
        .explanation strong {
            color: #00d4ff;
        }
        .correct-answer {
            margin-top: 10px;
            padding: 10px;
            background: #0a3a0a;
            border-radius: 8px;
            color: #81c784;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #252540;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #764ba2);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: #252540;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
        }
        .stat-item strong {
            color: #00d4ff;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
        }
        .nav-buttons .btn {
            flex: 1;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Заголовок урока -->
    <div class="lesson-header">
        <h1 th:text="${lesson.title}">Название урока</h1>
        <p th:text="${lesson.description}" style="color: #aaa; margin-top: 10px;">Описание урока</p>
        <div class="lesson-meta">
    <span class="difficulty-tag" th:classappend="'difficulty-' + ${lesson.difficulty}"
          th:text="${lesson.difficulty}">EASY</span>
            <span>⭐️ <strong th:text="${lesson.points}">0</strong> / <strong th:text="${lesson.totalPoints}">0</strong> очков</span>
            <span>📝 <strong th:text="${#lists.size(lesson.questions)}">0</strong> вопросов</span>
        </div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" th:style="'width: ' + ${progressPercent} + '%'">
        </div>
    </div>

    <!-- Уведомление если урок пройден -->
    <div th:if="${completed}" class="alert-success">
        🎉 Урок пройден! Получено <strong th:text="${lesson.points}">0</strong> из <strong th:text="${lesson.totalPoints}">0</strong> очков
    </div>

    <!-- Текущий вопрос (один) -->
    <div class="question-block">
        <div class="question-number" th:text="'Вопрос ' + (${currentQuestionIndex} + 1) + ' из ' + ${#lists.size(lesson.questions)}">
            Вопрос 1 из 5
        </div>
        <div class="question-text" th:text="${currentQuestion.question}">
            Текст вопроса
        </div>
    </div>

        <!-- Форма с вариантами ответов -->
        <form th:action="@{'/lessons/' + ${lesson.id} + '/answer'}" method="post">
            <div class="options">
                <div class="option" onclick="document.getElementById('opt0').click()">
                    <input type="radio" id="opt0" name="selectedAnswer" value="0"
                           th:disabled="${isAnswered}" required>
                    <label for="opt0" th:text="${currentQuestion.option1}">Вариант 1</label>
                </div>
                <div th:if="${currentQuestion.option2 != null}" class="option" onclick="document.getElementById('opt1').click()">
                    <input type="radio" id="opt1" name="selectedAnswer" value="1"
                           th:disabled="${isAnswered}">
                    <label for="opt1" th:text="${currentQuestion.option2}">Вариант 2</label>
                </div>
                <div th:if="${currentQuestion.option3 != null}" class="option" onclick="document.getElementById('opt2').click()">
                    <input type="radio" id="opt2" name="selectedAnswer" value="2"
                           th:disabled="${isAnswered}">
                    <label for="opt2" th:text="${currentQuestion.option3}">Вариант 3</label>
                </div>
                <div th:if="${currentQuestion.option4 != null}" class="option" onclick="document.getElementById('opt3').click()">
                    <input type="radio" id="opt3" name="selectedAnswer" value="3"
                           th:disabled="${isAnswered}">
                    <label for="opt3" th:text="${currentQuestion.option4}">Вариант 4</label>
                </div>
            </div>

            <input type="hidden" name="questionIndex" th:value="${currentQuestionIndex}">

            <button type="submit" class="btn btn-primary" th:disabled="${isAnswered || completed}">
                ✅ Ответить
            </button>
        </form>

    <!-- Если отвечали - показываем результат -->
    <div th:if="${isAnswered}">
        <div class="correct-answer">
            ✅ Правильный ответ:
            <strong th:text="${correctIndex == 0 ? currentQuestion.option1 :
                       correctIndex == 1 ? currentQuestion.option2 :
                       correctIndex == 2 ? currentQuestion.option3 :
                       currentQuestion.option4}">Правильный вариант</strong>
        </div>
        <div class="explanation">
            <strong>💡 Объяснение:</strong>
            <p th:text="${currentQuestion.description}" style="margin-top: 8px;">Объяснение</p>
        </div>
    </div>

</div>
</body>
</html>
