<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ответить на вопрос</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div th:if="${lesson.answered}" class="alert alert-warning">
        ⚠️ Вы уже отвечали на этот вопрос!
    </div>

    <h1 th:text="${lesson.question}">Вопрос</h1>
    <form th:action="@{/lessons/{id}/answer(id=${lesson.id})}" th:object="${answerRequest}" method="post">
        <div class="options">
            <div class="option">
                <input type="radio" id="option1" name="selectedAnswer" value="1" th:disabled="${lesson.answered}">
                <label for="option1" th:text="${lesson.option1}">Вариант 1</label>
            </div>
            <div class="option">
                <input type="radio" id="option2" name="selectedAnswer" value="2" th:disabled="${lesson.answered}">
                <label for="option2" th:text="${lesson.option2}">Вариант 2</label>
            </div>
            <div class="option" th:if="${lesson.option3 != null}">
                <input type="radio" id="option3" name="selectedAnswer" value="3" th:disabled="${lesson.answered}">
                <label for="option3" th:text="${lesson.option3}">Вариант 3</label>
            </div>
            <div class="option" th:if="${lesson.option4 != null}">
                <input type="radio" id="option4" name="selectedAnswer" value="4" th:disabled="${lesson.answered}">
                <label for="option4" th:text="${lesson.option4}">Вариант 4</label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" th:disabled="${lesson.answered}">Ответить</button>
    </form>

    <a th:href="@{/lessons}" class="btn btn-secondary">← Назад к списку</a>
</div>
</body>
</html>
